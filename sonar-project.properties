# =========================================================
# SonarCloud Monorepo Configuration for UTBGO
# =========================================================

# The key and name of your project (you must create this in SonarCloud dashboard)
sonar.projectKey=utbgo-enterprise
sonar.organization=utbgo-org
sonar.projectName=UTBGO Enterprise

# Encodings
sonar.sourceEncoding=UTF-8

# =========================================================
# Source Directories
# List all the directories containing source code
# =========================================================
sonar.sources=api-service,tracking-service,recommendations-service,video-worker-service,lib

# =========================================================
# Test Directories & Exclusions
# =========================================================
# Ignore test files in coverage metrics and analysis so they don't count as duplication or poor coverage
sonar.exclusions=**/test/**,**/tests/**,**/*_test.go,**/*_test.dart,**/test_*.py,**/*.spec.*

# Specifies the directories where the tests are located
sonar.tests=api-service,tracking-service,recommendations-service,test

# Pattern to match test files
sonar.test.inclusions=**/*_test.go,**/*_test.dart,**/test_*.py

# =========================================================
# Language Specific Configurations
# =========================================================
# Go
sonar.go.coverage.reportPaths=api-service/coverage.out

# Python
sonar.python.coverage.reportPaths=tracking-service/coverage.xml,recommendations-service/coverage.xml

# Flutter / Dart
sonar.dart.coverage.reportPaths=coverage/lcov.info

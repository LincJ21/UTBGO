# ─────────────────────────────────────────────────────────
# UTBGO — Render Blueprint (render.yaml)
# Despliegue de Monorepo (7 Servicios)
# ─────────────────────────────────────────────────────────

services:
  # 1. API Principal (Backend Go)
  - type: web
    name: utbgo-api
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: GIN_MODE
        value: release
      - key: PORT
        value: 8080
      - fromGroup: utbgo-shared-secrets

  # 2. Tracking Service (Microservicio Go)
  - type: web
    name: utbgo-tracking
    runtime: docker
    dockerContext: ./tracking-service
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: GIN_MODE
        value: release
      - key: PORT
        value: 8091
      - fromGroup: utbgo-shared-secrets

envVarGroups:
  - name: utbgo-shared-secrets
    envVars:
      - key: DB_CONNECTION_STRING
      - key: JWT_SECRET_KEY
      - key: CLOUDINARY_URL
      - key: ALLOWED_ORIGINS

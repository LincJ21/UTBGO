name: UTBGO Enterprise CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # =========================================================
  # JOB 1: Security Scan (CodeQL)
  # =========================================================
  codeql_scan:
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'go', 'python' ]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛡️ Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # =========================================================
  # JOB 2: Backend Go (API Service)
  # =========================================================
  go_api_test:
    name: Backend Go (Lint & Test)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./api-service

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ./api-service/go.sum

      - name: 📦 Install Dependencies
        run: go mod download

      - name: 🧹 Clean Code (Go Fmt)
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Error: Code is not properly formatted. Run 'go fmt ./...' locally."
            exit 1
          fi

      - name: 🔍 Clean Code (Go Vet)
        run: go vet ./...

      - name: 🧪 Run Security & Unit Tests
        run: go test -v ./...

  # =========================================================
  # JOB 3: Backend Python (Tracking & Recommendations)
  # =========================================================
  python_test:
    name: Backend Python (Lint & Test)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [tracking-service, recommendations-service]

    defaults:
      run:
        working-directory: ./${{ matrix.service }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ./${{ matrix.service }}/requirements.txt

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: 🧹 Clean Code (Flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 🧪 Run Unit Tests
        run: |
          # Solo ejecutar si existen tests para evitar que falle el CI temporalmente
          if [ -d "tests" ] || ls test_*.py 1> /dev/null 2>&1; then
            pytest
          else
            echo "No tests found. Skipping pytest."
          fi

  # =========================================================
  # JOB 4: Frontend Flutter
  # =========================================================
  flutter_test:
    name: Frontend Flutter (Lint & Test)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🔍 Clean Code (Flutter Analyze)
        run: flutter analyze

      - name: 🧪 Run Deterministic UI Tests
        run: flutter test

  # =========================================================
  # JOB 5: Code Quality (SonarCloud)
  # =========================================================
  sonarcloud_scan:
    name: Code Quality (SonarCloud)
    runs-on: ubuntu-latest
    needs: [go_api_test, python_test, flutter_test] # Se ejecuta despues de los tests para recopilar cobertura
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para análisis correcto de ramas en SonarCloud
      - name: 📡 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Nota: Requiere archivo sonar-project.properties en la raiz

  # =========================================================
  # JOB 6: Docker Build Validate (No Push)
  # =========================================================
  docker_build_validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [go_api_test, python_test]
    strategy:
      matrix:
        service: [api-service, tracking-service, recommendations-service, video-worker-service]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Test Build (Dry-Run)
        if: matrix.service != 'api-service'
        run: docker build -f ./${{ matrix.service }}/Dockerfile ./${{ matrix.service }}

      - name: 🐳 Test Build API (Dry-Run context fix)
        if: matrix.service == 'api-service'
        run: docker build -f ./Dockerfile .

name: UTBGO Enterprise CD Pipeline

on:
  workflow_run:
    workflows: ["UTBGO Enterprise CI Pipeline"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: './azure/terraform/container-apps'

jobs:
  # =========================================================
  # JOB 1: Provision Infrastructure (Phase 1)
  # =========================================================
  provision_infra:
    name: Provision Infrastructure Base
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: Production

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Azure Login (CLI)
        env:
          AZ_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZ_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          AZ_TENANT: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZ_SUBSCRIPTION: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal -u "$AZ_ID" -p "$AZ_SECRET" --tenant "$AZ_TENANT"
          az account set --subscription "$AZ_SUBSCRIPTION"

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 🚀 Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}

      - name: 🚀 Terraform Apply (Base)
        run: |
          terraform apply -auto-approve \
            -var="api_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" \
            -var="tracking_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" \
            -var="recommendations_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" \
            -var="video_worker_image=mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          
          TF_VAR_db_connection_string: ${{ secrets.TF_VAR_DB_CONNECTION_STRING || 'placeholder' }}
          TF_VAR_redis_url: ${{ secrets.TF_VAR_REDIS_URL || 'placeholder' }}
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET_KEY || 'placeholder' }}
          TF_VAR_cloudinary_url: ${{ secrets.TF_VAR_CLOUDINARY_URL || 'placeholder' }}
          TF_VAR_recommendations_api_key: ${{ secrets.TF_VAR_RECOMMENDATIONS_API_KEY || 'placeholder' }}
          TF_VAR_tracking_api_key: ${{ secrets.TF_VAR_TRACKING_API_KEY || 'placeholder' }}
          TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID || 'placeholder' }}
          TF_VAR_firebase_project_id: ${{ secrets.TF_VAR_FIREBASE_PROJECT_ID || 'placeholder' }}
          TF_VAR_azure_oidc_client_id: ${{ secrets.AZURE_AD_CLIENT_ID }}
          TF_VAR_azure_oidc_tenant_id: ${{ secrets.AZURE_AD_TENANT_ID }}

  # =========================================================
  # JOB 2: Build & Push to ACR
  # =========================================================
  build_and_push:
    name: Build & Push to Azure Container Registry
    needs: provision_infra
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Azure Login (CLI)
        env:
          AZ_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZ_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          AZ_TENANT: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZ_SUBSCRIPTION: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal -u "$AZ_ID" -p "$AZ_SECRET" --tenant "$AZ_TENANT"
          az account set --subscription "$AZ_SUBSCRIPTION"

      - name: 🐳 Login to Azure Container Registry
        run: az acr login --name utbgoregistryt4kj

      - name: 🔨 Build and Push Images
        run: |
          # API Go
          docker build -f ./Dockerfile -t utbgoregistryt4kj.azurecr.io/utbgo-api:${{ github.sha }} .
          docker push utbgoregistryt4kj.azurecr.io/utbgo-api:${{ github.sha }}
          
          # Tracking Python
          docker build -f tracking-service/Dockerfile -t utbgoregistryt4kj.azurecr.io/utbgo-tracking:${{ github.sha }} ./tracking-service
          docker push utbgoregistryt4kj.azurecr.io/utbgo-tracking:${{ github.sha }}
          
          # Recommendations Python
          docker build -f recommendations-service/Dockerfile -t utbgoregistryt4kj.azurecr.io/utbgo-recommendations:${{ github.sha }} ./recommendations-service
          docker push utbgoregistryt4kj.azurecr.io/utbgo-recommendations:${{ github.sha }}
          
          # Video Worker Python
          docker build -f video-worker-service/Dockerfile -t utbgoregistryt4kj.azurecr.io/utbgo-video-worker:${{ github.sha }} ./video-worker-service
          docker push utbgoregistryt4kj.azurecr.io/utbgo-video-worker:${{ github.sha }}

  # =========================================================
  # JOB 3: Update Container Apps with new images
  # =========================================================
  deploy_apps:
    name: Update Apps via Terraform
    needs: build_and_push
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Azure Login (CLI)
        env:
          AZ_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZ_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          AZ_TENANT: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZ_SUBSCRIPTION: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal -u "$AZ_ID" -p "$AZ_SECRET" --tenant "$AZ_TENANT"
          az account set --subscription "$AZ_SUBSCRIPTION"

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 🚀 Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}

      - name: 🚀 Terraform Apply (Final)
        run: |
          terraform apply -auto-approve \
            -var="api_image=utbgoregistryt4kj.azurecr.io/utbgo-api:${{ github.sha }}" \
            -var="tracking_image=utbgoregistryt4kj.azurecr.io/utbgo-tracking:${{ github.sha }}" \
            -var="recommendations_image=utbgoregistryt4kj.azurecr.io/utbgo-recommendations:${{ github.sha }}" \
            -var="video_worker_image=utbgoregistryt4kj.azurecr.io/utbgo-video-worker:${{ github.sha }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          
          TF_VAR_db_connection_string: ${{ secrets.TF_VAR_DB_CONNECTION_STRING || 'placeholder' }}
          TF_VAR_redis_url: ${{ secrets.TF_VAR_REDIS_URL || 'placeholder' }}
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET_KEY || 'placeholder' }}
          TF_VAR_cloudinary_url: ${{ secrets.TF_VAR_CLOUDINARY_URL || 'placeholder' }}
          TF_VAR_recommendations_api_key: ${{ secrets.TF_VAR_RECOMMENDATIONS_API_KEY || 'placeholder' }}
          TF_VAR_tracking_api_key: ${{ secrets.TF_VAR_TRACKING_API_KEY || 'placeholder' }}
          TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID || 'placeholder' }}
          TF_VAR_firebase_project_id: ${{ secrets.TF_VAR_FIREBASE_PROJECT_ID || 'placeholder' }}
          TF_VAR_azure_oidc_client_id: ${{ secrets.AZURE_AD_CLIENT_ID }}
          TF_VAR_azure_oidc_tenant_id: ${{ secrets.AZURE_AD_TENANT_ID }}

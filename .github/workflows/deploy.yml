name: UTBGO CD Pipeline (Deploy to Azure)

on:
  workflow_run:
    workflows: ["UTBGO CI Pipeline"]
    types:
      - completed
    branches:
      - main
      - release/**

permissions:
  id-token: write # Required for Azure OIDC Federated Credentials
  contents: read

jobs:
  build_and_deploy:
    name: Build & Deploy to Azure Container Apps
    # Only run if the CI pipeline was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🐳 Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: 🔨 Build and Push Go API Image
        run: |
          docker build -f api-service/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-api:${{ github.sha }} ./api-service
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-api:${{ github.sha }}

      - name: 🔨 Build and Push Tracking Image
        run: |
          docker build -f tracking-service/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-tracking:${{ github.sha }} ./tracking-service
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-tracking:${{ github.sha }}

      - name: 🔨 Build and Push Recommendations Image
        run: |
          docker build -f recommendations-service/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-recommendations:${{ github.sha }} ./recommendations-service
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-recommendations:${{ github.sha }}

      - name: 🔨 Build and Push Video Worker Image
        run: |
          docker build -f video-worker-service/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-video-worker:${{ github.sha }} ./video-worker-service
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-video-worker:${{ github.sha }}

      - name: 🚀 Deploy API to Azure Container Apps
        uses: azure/container-apps-deploy-action@v3
        with:
          containerAppName: utbgo-api
          resourceGroup: utbgo-rg
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-api:${{ github.sha }}

      - name: 🚀 Deploy Tracking to Azure Container Apps
        uses: azure/container-apps-deploy-action@v3
        with:
          containerAppName: utbgo-tracking
          resourceGroup: utbgo-rg
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-tracking:${{ github.sha }}

      - name: 🚀 Deploy Recommendations to Azure Container Apps
        uses: azure/container-apps-deploy-action@v3
        with:
          containerAppName: utbgo-recommendations
          resourceGroup: utbgo-rg
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-recommendations:${{ github.sha }}

      - name: 🚀 Deploy Video Worker to Azure Container Apps
        uses: azure/container-apps-deploy-action@v3
        with:
          containerAppName: utbgo-video-worker
          resourceGroup: utbgo-rg
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/utbgo-video-worker:${{ github.sha }}
